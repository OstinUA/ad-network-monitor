<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="header__left">
      <div class="header__icon">
        <img src="/icons/icon128.png" alt="Logger Icon" width="20" height="20">
      </div>
      <h1 class="header__title">Ad Network Logger</h1>
    </div>
    <div class="header__actions">
      <button id="btn-toggle" class="btn btn--icon" title="Pause / Resume monitoring">
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="hidden"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button id="btn-clear" class="btn btn--icon" title="Clear captured data">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
      <button id="btn-export" class="btn btn--icon" title="Export as JSON">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </header>

  <section id="stats-bar" class="stats-bar">
    <div class="stat" data-category="total">
      <span class="stat__count" id="stat-total">0</span>
      <span class="stat__label">Total</span>
    </div>
    <div class="stat" data-category="advertising">
      <span class="stat__dot" style="background:#e74c3c"></span>
      <span class="stat__count" id="stat-advertising">0</span>
      <span class="stat__label">Ads</span>
    </div>
    <div class="stat" data-category="tracking">
      <span class="stat__dot" style="background:#f39c12"></span>
      <span class="stat__count" id="stat-tracking">0</span>
      <span class="stat__label">Tracking</span>
    </div>
    <div class="stat" data-category="pixel">
      <span class="stat__dot" style="background:#9b59b6"></span>
      <span class="stat__count" id="stat-pixel">0</span>
      <span class="stat__label">Pixels</span>
    </div>
    <div class="stat" data-category="social">
      <span class="stat__dot" style="background:#3498db"></span>
      <span class="stat__count" id="stat-social">0</span>
      <span class="stat__label">Social</span>
    </div>
  </section>

  <nav class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="advertising">Ads</button>
    <button class="filter" data-filter="tracking">Tracking</button>
    <button class="filter" data-filter="pixel">Pixels</button>
    <button class="filter" data-filter="social">Social</button>
  </nav>

  <section id="request-list" class="request-list">
    <div id="empty-state" class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No ad network requests detected yet.</p>
      <p class="empty-state__hint">Browse a website to start capturing.</p>
    </div>
  </section>

  <footer class="footer">
    <span id="page-url" class="footer__url"></span>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
